<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Lunissolar</title>
    <!-- Carrega o Tailwind CSS instantaneamente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            },
            animation: {
              float: 'float 4s ease-in-out infinite',
            }
          }
        }
      }
    </script>

    
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- SPLASH SCREEN SCREEN DE ENTRADA -->
    <div id="vibet-splash">
        <div class="splash-content">
            <div class="splash-subtitle">Uma criação</div>
            <div class="splash-logo">vibe<span>Ti</span></div>
            <!-- Nome atualizado para o seu projeto -->
            <div class="splash-app-name">Calendário Lunissolar</div>
            <div class="splash-loader">
                <div class="splash-progress"></div>
            </div>
        </div>
    </div>
    
    <style>
    /* Estilos isolados para não quebrar o layout do seu app */
    #vibet-splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #030712; /* Ajustado para bater com o fundo escuro do Tailwind (slate-950) */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999; /* Garante que fica por cima de tudo */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        transition: opacity 0.4s ease, transform 0.4s ease;
    }
    
    .splash-content {
        text-align: center;
        width: 100%;
        max-width: 450px; /* Aumentado de 320px para dar mais presença na tela */
        padding: 20px;
    }
    
    .splash-subtitle {
        color: #4b5563;
        font-size: 0.85rem; /* Aumentado sutilmente */
        text-transform: uppercase;
        letter-spacing: 6px; /* Mais espaçado */
        margin-bottom: 6px;
        opacity: 0;
        animation: splFadeIn 0.8s ease forwards 0.2s;
    }
    
    .splash-logo {
        font-size: 3.5rem; /* AUMENTADO: Era 2.2rem, agora está gigante e imponente */
        color: #ffffff;
        font-weight: 300;
        letter-spacing: -1px;
        opacity: 0;
        transform: translateY(15px);
        animation: splFadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s;
    }
    
    .splash-logo span {
        color: #fbbf24; /* MUDADO: De verde para Dourado/Âmbar para combinar com o tema lunar */
        font-weight: 700;
    }
    
    .splash-app-name {
        color: #9ca3af;
        font-size: 1.25rem; /* Aumentado de 1rem para dar leitura perfeita */
        margin-top: 16px;
        font-weight: 400;
        letter-spacing: 2px;
        opacity: 0;
        animation: splFadeIn 0.8s ease forwards 1s;
    }
    
    .splash-loader {
        width: 180px; /* Aumentado de 140px para acompanhar o tamanho do logo */
        height: 3px;  /* Grosso o suficiente para ficar nítido */
        background-color: #1f2937;
        margin: 32px auto 0 auto;
        border-radius: 4px;
        overflow: hidden;
    }
    
    .splash-progress {
        width: 0%;
        height: 100%;
        /* MUDADO: Gradiente agora vai do dourado para um azul místico, ornando com o calendário */
        background: linear-gradient(90deg, #fbbf24, #3b82f6);
        animation: splLoad 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.8s;
    }
    
    /* Classes de saída que serão ativadas por JavaScript */
    #vibet-splash.fade-out {
        opacity: 0;
        pointer-events: none;
        transform: scale(1.03); /* Efeito suave de imersão ao abrir o app */
    }
    
    /* Animações */
    @keyframes splFadeIn { to { opacity: 1; } }
    @keyframes splFadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes splLoad { to { width: 100%; } }
    </style>
    
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const splash = document.getElementById("vibet-splash");
        
        // Tempo ajustado para 2.3 segundos para casar perfeitamente com a nova velocidade da barra
        setTimeout(() => {
            splash.classList.add("fade-out");
            
            // Remove totalmente do DOM após a transição para economizar memória e desempenho
            setTimeout(() => splash.remove(), 400); 
        }, 4000);
    });
    </script>

    
    <!-- <main> original -->
    <main class="w-full max-w-md">
        
        <!-- className="app" original -->
        <div class="flex flex-col items-center justify-center">

            <!-- className="card" original 
                 Nota: O estilo de borda colorida dinâmico nós vamos aplicar depois via JavaScript! -->
            <div id="calendar-card" class="w-full bg-slate-900 rounded-2xl p-6 shadow-2xl text-center space-y-4 border-t-[6px] border-slate-700">
            
                <!-- Aplique as classes animate-float e o drop-shadow na DIV -->
                <div id="moon-display" class="my-2 flex justify-center items-center animate-float drop-shadow-[0_0_25px_rgba(255,255,255,0.5)]">
                      <img src="" alt="Lua" class="w-24 h-24 rounded-full object-cover" />
                </div>

                <!-- className="month" original -->
                <h1 id="poetic-month" class="text-3xl font-light tracking-wide text-indigo-200">
                    O Entardecer
                </h1>

                <!-- Parágrafos de dados mecânicos do calendário -->
                <p id="lunar-day" class="text-base text-2xl text-slate-300">
                    Hoje é o 28º dia lunar
                </p>

                <p id="period-display" class="text-2xl italic text-slate-400">
                    O Retorno
                </p>

                <p id="primavera-display" class="text-2xl text-slate-300">
                    Estamos na 8ª Primavera
                </p>

                <p id="cycle-display" class="text-2xl text-slate-400 font-semibold">
                    Ciclo 1
                </p>

                <p id="alignment-display" class="text-sm text-slate-400 max-w-xs mx-auto leading-relaxed">
                    Restando 11 primaveras para o alinhamento e o início de um novo ciclo.
                </p>

                <!-- Seção Estação Solar -->
                <div class="pt-2 border-t border-slate-800/60">
                    <h3 class="text-sm font-semibold tracking-wider text-amber-400 uppercase">☀️ Estação Solar</h3>
                    <p id="solar-season" class="text-base text-slate-200 mt-1">
                        Inverno
                    </p>
                </div>

                <!-- className="reflection" original (Onde a IA vai trabalhar depois) -->
                <div class="reflection mt-4 pt-4 border-t border-slate-800 bg-slate-950/40 p-4 rounded-xl text-left">
                    <h3 class="text-xs uppercase tracking-widest text-indigo-400 font-semibold mb-2">✨ Reflexão</h3>
                    <p id="reflection-text" class="text-sm text-slate-300 italic leading-relaxed font-serif"></p>
                    <p id="reflection-origin" class="text-sm text-slate-300 italic leading-relaxed font-serif"></p>
                </div>

            </div>
          
        </div>

    </main>

    <!-- Script que vai controlar a dinâmica futuramente -->
    <script type="module" src="./app.js"></script>
</body>
</html>
